# =============================================================================
# 02-embeddings — Multi-corpus configuration
# =============================================================================
# O embedder (qwen3-embedding:8b) é multilíngue — por isso a seção
# `embeddings.models` é compartilhada. Cada corpus só precisa saber qual
# coluna de texto e qual subdiretório usar.
#
# Selecione o corpus editando `default_corpus` abaixo ou a célula `CORPUS = "..."`
# no início de `notebooks/02_embeddings.ipynb`.
# =============================================================================

corpora:
  
  folha:
    text_column: message
    subdir: folha

  tweets_bre2022:
    text_column: message
    subdir: tweets_bre2022

default_corpus: tweets_bre2022
seed: 42

embeddings:
  ollama_timeout_default: 120

  models:
    # === Modelo ativo (default) ===
    - name: "qwen3-embedding:8b"
      type: "ollama"
      max_tokens: 64000
      dimension: null              # null = dimensão nativa 4096d (sem truncação)
      suffix: "4096d"
      timeout: 360
