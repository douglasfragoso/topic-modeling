# =============================================================================
# 02-embeddings — Multi-corpus configuration
# =============================================================================
# O embedder (qwen3-embedding:0.6b) é multilíngue e funciona para PT-BR e EN —
# por isso a seção `embeddings.models` é compartilhada. Cada corpus só precisa
# saber qual coluna de texto e qual subdiretório usar.
#
# Selecione o corpus editando `default_corpus` abaixo ou a célula `CORPUS = "..."`
# no início de `notebooks/02_embeddings.ipynb`.
# =============================================================================

corpora:
  social:
    text_column: message     # coluna de texto em data/input/social/corpus_limpo.csv
    subdir: social           # data/input/social/, data/output/social/

  ag_news:
    text_column: message
    subdir: ag_news

  reuters:
    text_column: message
    subdir: reuters

  folha:
    text_column: message
    subdir: folha

  tweets_bre2022:
    text_column: message
    subdir: tweets_bre2022

  arj:
    text_column: text_en     # 01-preprocessing preserva o nome original da coluna
    subdir: arj

default_corpus: arj
seed: 42

embeddings:
  ollama_timeout_default: 120

  models:
    # === Modelo ativo (default) ===
    - name: "qwen3-embedding:0.6b"
      type: "ollama"
      max_tokens: 32000
      dimension: null              # null = dimensão nativa 1024d (sem truncação)
      suffix: "1024d"
      timeout: 120
