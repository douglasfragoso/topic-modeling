# =============================================================================
# 04-topic-modeling — Multi-corpus configuration
# =============================================================================
# Cada entrada em `corpora:` carrega o que varia por corpus (subdir, coluna de
# texto, lista de stopwords-ruído, fórmula STM, agregação). Os parâmetros dos
# algoritmos (BERTopic, LDA, NMF, STM) ficam em seções compartilhadas.
#
# Selecione o corpus editando `default_corpus` no final deste arquivo ou a célula
# `CORPUS = "..."` no início de cada notebook em `notebooks/`.
# =============================================================================

corpora:

  # ---------------------------------------------------------------------------
  # Corpus folha — Folha de Sao Paulo 2024 (PT-BR, validacao canonica LDA + STM)
  # ---------------------------------------------------------------------------
  folha:
    subdir: folha
    text_column: message
    date_column: date
    post_id_column: post_id
    covariates:
      - date
      - category
    stopwords_emojis:
      - "atilde"
      - "ccedil"
      - "iacute"
      - "eacute"
      - "aacute"
      - "otilde"
      - "uacute"
      - "ocirc"
      - "acirc"
      - "ecirc"
      - "novamente"
      - "representando"
      - "quot"    # resíduo de &quot; HTML — polui T4 (cinema/cultura)
      - "the"     # artigo inglês não filtrado — polui c-TF-IDF de tópicos PT
      - "seta"    # símbolo de lista (→) tokenizado — ruído em T3/T21
    token_pattern: '(?u)\b[a-zA-ZÀ-ÿ]{2,}\b'
    bertopic_language: multilingual
    stm_prevalence_formula: "~ s(as.numeric(as.Date(date))) + category"
    stm_min_tokens_per_doc: 200
    language: pt

  # ---------------------------------------------------------------------------
  # Corpus tweets_bre2022 — Tweets BR Eleições 2022 (PT-BR, Zenodo 14834749)
  # ---------------------------------------------------------------------------
  tweets_bre2022:
    subdir: tweets_bre2022
    text_column: message
    date_column: date
    post_id_column: post_id
    covariates:
      - category             # YYYY-MM (mês) — proxy temporal para análise eleitoral
    stopwords_emojis:
      - "coração_roxo"
      - "coração_vermelho"
      - "coração_amarelo"
      - "coração_azul"
      - "coração_verde"
      - "coração_laranja"
      - "coração_preto"
      - "coração_branco"
      - "brilhos"
      - "marca_de_seleção_branca"
      - "rosto_sorridente_com_olhos_de_coração"
      - "rosto_sorridente_com_3_corações"
      - "rosto_sorridente_com_olhos_sorridentes"
      - "rosto_com_olho_piscando"
      - "rosto_alegre"
      - "rosto_apaixonado"
      - "mãos_aplaudindo"
      - "polegar_para_cima"
      - "polegar_para_baixo"
      - "fogo"
      - "fogos_de_artifício"
      - "câmera"
      - "câmera_com_flash"
    token_pattern: '(?u)\b[a-zA-ZÀ-ÿ_]{2,}\b'
    bertopic_language: multilingual
    stm_prevalence_formula: ""   # tweets: STM não é alvo deste corpus
    stm_min_tokens_per_doc: 30
    language: pt
    # Override do bloco `bertopic:` compartilhado (calibrado p/ folha) — 1ª
    # calibração via sweep_bertopic_grid (108 combos x 5 reduce_nr, seed=42,
    # 2026-07-01). Aplicado via _helpers.apply_bertopic_overrides (merge raso
    # por chave; não muta o bloco compartilhado nem afeta outros corpora).
    bertopic_overrides:
      umap:
        n_neighbors: 15   # ← 10 (folha); top-3 combos do grid convergem em leaf+mcs alto
      hdbscan:
        min_cluster_size: 30           # ← 8 (folha); melhor composite C_v/Diversity/Exclus/FREX, robusto nos 5 reduce_nr
        cluster_selection_method: leaf # ← eom (folha); leaf domina estruturalmente p/ tweets (oposto do folha)
      # reduce_topics_nr NAO sobrescrito: nr=25 (valor compartilhado) já é o
      # melhor equilíbrio C_v/Diversity também p/ tweets (mesmo critério do folha).
      # reduce_outliers (strategy/threshold) NAO recalibrado ainda: os sweeps
      # outlier_strategies/outlier_threshold desta rodada rodaram sobre a
      # estrutura ANTIGA (nn=10/mcs=8/eom, default compartilhado) — herda
      # c-tf-idf/0.15 do folha até rodar um novo threshold sweep sob nn=15/mcs=30/leaf.

default_corpus: tweets_bre2022
seed: 42

# =============================================================================
# BERTopic (compartilhado — embedder e algoritmo são multilíngues)
# =============================================================================
bertopic:
  embedding_model: "qwen3-embedding:8b"
  embedding_backend: "ollama"          # "ollama" ou "sentence_transformers"
  embedding_dimension: null            # null = nativo 4096d (qwen3-embedding:8b)
  embedding_suffix: "4096d"            # sufixo do .npy gerado pelo 02-embeddings
  umap:
    n_components: 5
    n_neighbors: 10        # ← 20; composite sweep: nn=10 domina K=20-30
    min_dist: 0.0
    metric: "cosine"
  hdbscan:
    min_cluster_size: 8    # ← 40; sweep: Diversity +2.2%, Exclus +7.7% vs mcs=40
    min_samples: null      # null = default HDBSCAN (= mcs=8)
    cluster_selection_method: "eom"   # ← leaf; EOM domina LEAF no regime mcs=8/nr=25 (C_v +0.039, Diversity +0.025, -7.6pp outliers, robusto nos 3 nn); reduce_topics_nr controla a granularidade a jusante
  min_topic_size: 8        # = mcs; evita filtrar clusters válidos antes do reduce_topics
  mmr_diversity: 0.2
  reduce_topics_nr: 25     # ← 30; nr=25 → K=24; melhor equilíbrio C_v/Diversity
  macro_k: 10              # ← 8; sweep: maior cluster 665 docs (vs 1313 em macro_k=8)
  vectorizer:
    ngram_range: [1, 2]
    # token_pattern e language vêm do corpus_cfg (variam por idioma)
  reduce_outliers:
    enabled: true          # ← false; threshold sweep: c-tf-idf 0.15 melhor composite
    strategy: "c-tf-idf"   # ← "off"; melhor para textos longos (Folha)
    threshold: 0.15        # novo; c_v=0.605, outlier_post=25%, excl=0.476 — melhor composite

# === LDA ===
lda:
  k_range: [5, 30]
  no_below: 5
  no_above: 0.5

# === NMF ===
nmf:
  k_range: [5, 30]
  max_features: 5000

# === STM ===
stm:
  k_range: [5, 30]
  # Caminho do Rscript. Por padrão usa o `Rscript` no PATH (funciona em
  # Linux/Mac e em Windows se R foi instalado com "Add to PATH"). Se precisar
  # apontar para um binário específico, edite aqui (ex: Windows sem PATH):
  #   "C:/Program Files/R/R-4.5.3/bin/Rscript.exe"
  rscript_path: "Rscript"
  max_covariates: 3
  # prevalence_formula e min_tokens_per_doc vêm do corpus_cfg

# === Nomeação (LLM, multilíngue) ===
llm:
  model: "gemma2:2b-instruct-q4_K_M"
  fallback_model: "qwen3:4b"
  base_url: "http://localhost:11434"
  enabled: true
  timeout_per_topic: 30

# === Avaliação ===
evaluation:
  run_stability: true
  stability_seeds: [42]
  kappa_threshold: 0.70
  top_n_keywords: 10
  top_n_words_cache: 100
  top_n_keywords_metrics: 20
  # Modelo de embedding SÓ para a Coerência Semântica (métrica sobre keywords curtas).
  # Desacoplado do bertopic.embedding_model (8B) porque o 8B é pesado demais para
  # centenas de requisições curtas nesta máquina (7-19s/req + 500 frequente do Ollama).
  # Se ausente/None, cai no bertopic.embedding_model. Documentos seguem no 8B.
  semantic_coherence_embedding_model: "qwen3-embedding:0.6b"
  top_n_keywords_llm: 50   # prompt_builder_custom lê top_n_llm do escopo (cell 9)
  top_n_keywords_viz: 30
  top_n_keywords_npmi: 100
  robustness_top_n_sweep: [10, 15, 20, 25, 30, 50, 100]
  # Sweep de estrategias/threshold de reduce_outliers (_helpers.sweep_outlier_strategies/
  # sweep_outlier_threshold). Custoso (refit completo x estrategia x seed) — off por padrao.
  run_outlier_sweep: false   # tweets_bre2022: concluído 2026-07-01 (run tweets_bre2022_20260630_234301,
                              # sob estrutura ANTIGA nn=10/mcs=8/eom) — c-tf-idf venceu; ver PIPELINE_TWEETS_BERTOPIC.md §13.1.
                              # Recalibrar sob nn=15/mcs=30/leaf (bertopic_overrides) antes de confiar no threshold.
  outlier_sweep_seeds: [42]  # 1 seed suficiente para comparar estratégias
  outlier_sweep_strategies: ["off", "c-tf-idf", "embeddings", "probabilities", "distributions"]
  # Sweep de threshold por estrategia (sweep_outlier_threshold): responde se
  # reducao parcial (threshold > 0) bate reducao total (0.0) ou off.
  # c-tf-idf/probabilities/distributions: scores em [0,1]; 0.0 = realoca tudo.
  # embeddings: similaridade coseno tipicamente alta — faixa 0.50-0.90.
  run_threshold_sweep: false # tweets_bre2022: concluído 2026-07-01 (mesmo run, estrutura ANTIGA) — threshold=0.15
                              # mantido (ganho de 0.20 é marginal); ver PIPELINE_TWEETS_BERTOPIC.md §13.2
  threshold_sweep_seeds: [42]
  threshold_sweep_grids:
    c-tf-idf:      [0.0, 0.05, 0.10, 0.15, 0.20, 0.30]
    embeddings:    [0.0, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90]
    probabilities: [0.0, 0.05, 0.10, 0.15, 0.20, 0.30]
    distributions: [0.0, 0.05, 0.10, 0.15, 0.20, 0.30]
  # Grid UMAP n_neighbors x HDBSCAN min_cluster_size x HDBSCAN min_samples
  # (_helpers.sweep_bertopic_grid). Refit completo por (seed × nn × mcs × ms × csm);
  # reduce_nr é só pós-processamento (barato, copy-per-variant).
  # min_samples é o parâmetro mais crítico para texto curto (tweets): controla
  # conservadorismo do HDBSCAN → maior = mais outliers. Varrer explicitamente.
  # 30 e 35 removidos do mcs (redundantes com 25/40 no primeiro sweep de tweets).
  # K=10/15 removidos do reduce_nr (insuficientes para 200k tweets eleitorais).
  # 2 seeds mínimo para Jaccard stability ser confiável (docstring sweep_bertopic_grid).
  run_param_sweep: false    # tweets_bre2022: concluído 2026-07-01 (run tweets_bre2022_20260630_234301, 108 combos x
                             # 5 reduce_nr, single-seed) — vencedor nn=15/mcs=30/leaf aplicado via
                             # corpora.tweets_bre2022.bertopic_overrides; ver PIPELINE_TWEETS_BERTOPIC.md §12.
  param_sweep_seeds: [42]
  param_sweep_n_neighbors: [10, 15, 20]
  param_sweep_min_cluster_size: [8, 15, 25, 30, 35, 40]
  param_sweep_min_samples: [null, 5, 15]   # null=default(=mcs); 5=permissivo; 15=conservador (crítico em tweets)
  param_sweep_cluster_selection_methods: ["leaf", "eom"]
  param_sweep_reduce_topics_nr: [10, 15, 20, 25, 30]
  param_sweep_macro_k: [4, 5, 6, 7, 8, 10, 12]  # NOTA: chave não consumida por nenhuma função em _helpers.py
                                                  # (macro_k sweep é gerado inline no notebook, não por este grid) — inerte.
  # LDA alpha/eta hyperparameter grid (fixo K=BEST_K; passes=10 para velocidade)
  # alpha: prior Dirichlet doc→topico
  #   'symmetric' = uniforme; 'asymmetric' = 1/k (temas dominantes);
  #   float baixo (0.01) = docs concentrados em poucos topicos; alto (0.5) = difusos
  # eta: prior Dirichlet topico→palavra
  #   null = gensim default (1/K); float baixo (0.01) = vocab concentrado (topicos distintos)
  lda_alpha_grid: ['symmetric', 'asymmetric', 0.01, 0.1, 0.5]
  lda_eta_grid: [null, 0.01, 0.1]
